<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ćwiczenie 3 – SCSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Komponenty UI</h1>

    <section class="section">
      <h2>Alerty</h2>
      <div class="alert alert--success">✅ Operacja zakończona pomyślnie!</div>
      <div class="alert alert--error">❌ Wystąpił błąd. Spróbuj ponownie.</div>
    </section>

    <section class="section">
      <h2>Przyciski</h2>
      <button class="btn btn--primary">Zapisz</button>
      <button class="btn btn--secondary">Anuluj</button>
    </section>

    <section class="section">
      <h2>Karta</h2>
      <div class="card">
        <div class="card__header">Tytuł karty</div>
        <div class="card__body">
          To jest treść karty. Możesz tutaj umieścić dowolny tekst lub inne elementy HTML.
        </div>
        <div class="card__footer">
          <button class="btn btn--secondary">Odrzuć</button>
          <button class="btn btn--primary">Zatwierdź</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
